<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TxRiskAgent Snap Demo</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">TxRiskAgent Snap Demo</p>
        <h1>Transaction insight playground</h1>
        <p class="summary">
          Install the local Snap, then send reproducible transactions and review
          TxRiskAgent risk results inside MetaMask before signing.
        </p>

        <div class="top-controls">
          <button id="connect">Install TxRiskAgent</button>

          <label class="field toolbar-field">
            <span>TxRisk endpoint</span>
            <select id="endpoint-select">
              <option value="local">Local dev</option>
              <option value="prod">Remote prod</option>
            </select>
          </label>

          <div class="mode-toggle">
            <button id="preview-mode" class="toggle-option preview-label" type="button">
              Preview Risk
            </button>
            <input id="send-mode" type="checkbox" checked />
            <button id="send-mode-button" class="toggle-option send-label" type="button">
              Send transaction
            </button>
          </div>
        </div>

        <section class="transaction-group">
          <h2>Native Token transfers</h2>
          <div class="transaction-row native-row">
            <label class="field network-field">
              <span>Network</span>
              <select id="network-select">
                <option value="eth">ETH</option>
                <option value="bnb">BNB</option>
              </select>
            </label>

            <label class="field address-field">
              <span>Address</span>
              <input
                id="custom-address"
                type="text"
                list="native-recipient-options"
                spellcheck="false"
                placeholder="0x recipient address"
              />
              <datalist id="native-recipient-options">
                <option value="0x1111111111111111111111111111111111111111" label="normal">normal</option>
                <option value="0x000000000000000000000000000000000000dead" label="dead">dead</option>
              </datalist>
            </label>

            <button id="send-custom">Transfer 0.1 Native Token</button>
          </div>
        </section>

        <section class="transaction-group">
          <h2>Smart contract calls</h2>
          <div class="scenario-grid">
            <button id="claim-airdrop" class="scenario-button harmful">
              Claim LAB-USDC airdrop on ETH
            </button>
            <button id="approve-bsc-usdt" class="scenario-button harmful">
              Approve 10 USDT for Atalis Loan on BSC
            </button>
            <button class="scenario-button benign" data-scenario="nft-revoke" type="button">
              NFT approval revoke
            </button>
            <button class="scenario-button harmful" data-scenario="erc20-unlimited" type="button">
              ERC20 unlimited approval
            </button>
            <button class="scenario-button harmful" data-scenario="nft-approve-all" type="button">
              NFT approve all
            </button>
            <button class="scenario-button harmful" data-scenario="hidden-multicall" type="button">
              Hidden multicall drain
            </button>
            <button class="scenario-button harmful" data-scenario="native-drainer" type="button">
              Native transfer drainer
            </button>
          </div>
        </section>

        <div id="output-grid" class="output-grid">
          <pre id="constructed-output">Waiting for transaction...</pre>
          <pre id="scan-output">Waiting for TxRiskAgent output...</pre>
        </div>
      </section>
    </main>

    <script type="module" src="/src/site.js"></script>
  </body>
</html>
