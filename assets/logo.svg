      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="alertGradient" x1="74" y1="64" x2="166" y2="157" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ff5a5f"/>
    </linearGradient>
    <filter id="graphShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#09111f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#graphShadow)">
