<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">TxRiskAgent logo</title>
  <desc id="desc">A hexagonal transaction graph mark with the TxRiskAgent wordmark.</desc>
  <defs>
