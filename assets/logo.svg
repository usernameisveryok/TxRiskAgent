    <path d="M82 96h58M111 71v77M82 125l58-29M82 96l58 29" fill="none" stroke="#dbeafe" stroke-opacity="0.86" stroke-width="6" stroke-linecap="round"/>
    <circle cx="82" cy="96" r="12" fill="#ffffff"/>
    <circle cx="140" cy="96" r="12" fill="#ffffff"/>
    <circle cx="82" cy="125" r="12" fill="#ffffff"/>
    <circle cx="140" cy="125" r="12" fill="url(#alertGradient)"/>
    <circle cx="111" cy="71" r="10" fill="#ffffff"/>
    <circle cx="111" cy="148" r="10" fill="#ffffff"/>
    <circle cx="111" cy="111" r="20" fill="#111827"/>
