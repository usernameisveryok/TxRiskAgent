<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TxRiskAgent Logo Options</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #667085;
        --line: #d8dee8;
        --paper: #f7f9fc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1060px, calc(100% - 40px));
        margin: 0 auto;
        padding: 42px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 16px;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .option {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 22px;
      }

      .label {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .label strong {
        font-size: 16px;
      }

      .label span {
        color: var(--muted);
        font-size: 13px;
      }

      img {
        display: block;
        width: min(720px, 100%);
        height: auto;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 24px, 1060px);
          padding: 24px 0;
        }

        .option {
          padding: 16px;
        }

        .label {
          display: block;
        }

        .label span {
          display: block;
          margin-top: 4px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TxRiskAgent Logo Options</h1>
      <p>Three vector directions for review. Each source file is an editable transparent SVG.</p>
      <section class="grid" aria-label="Logo options">
        <article class="option">
          <div class="label">
            <strong>01 Shield Signal</strong>
            <span>Security-first, strongest product-trust read</span>
          </div>
          <img src="./txriskagent-logo-01-shield.svg" alt="TxRiskAgent Shield Signal logo option" />
        </article>
        <article class="option">
          <div class="label">
            <strong>02 Risk Graph</strong>
            <span>Chain analytics and threat-intel focused</span>
          </div>
          <img src="./txriskagent-logo-02-graph.svg" alt="TxRiskAgent Risk Graph logo option" />
        </article>
        <article class="option">
          <div class="label">
            <strong>03 Agent Core</strong>
            <span>AI agent and transaction-scanning focused</span>
          </div>
          <img src="./txriskagent-logo-03-agent-core.svg" alt="TxRiskAgent Agent Core logo option" />
        </article>
      </section>
    </main>
  </body>
</html>
